name: rocm-image

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - .github/workflows/rocm-image.yml
      - dockerfiles/Dockerfile
      - dockerfiles/Dockerfile.rocm
      - scripts/entrypoint.sh
      - scripts/devinstall_software.sh
      - scripts/ldpretend.sh
      - scripts/devinstall_llvm.sh
      - scripts/devinstall_torch.sh
      - scripts/devinstall_helion.sh
      - scripts/devinstall_triton.sh
      - scripts/devinstall_vllm.sh
      - scripts/devcreate_user.sh
      - scripts/devsetup.sh
  pull_request:
    paths:
      - .github/workflows/rocm-image.yml
      - dockerfiles/Dockerfile
      - dockerfiles/Dockerfile.rocm
      - scripts/entrypoint.sh
      - scripts/devinstall_software.sh
      - scripts/ldpretend.sh
      - scripts/devinstall_llvm.sh
      - scripts/devinstall_torch.sh
      - scripts/devinstall_helion.sh
      - scripts/devinstall_triton.sh
      - scripts/devinstall_vllm.sh
      - scripts/devcreate_user.sh
      - scripts/devsetup.sh
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  rocm-image_build:
    uses: ./.github/workflows/image-build.yml
    with:
      image-name: rocm
      image-tag: 7.2.1-centos10
      dockerfile: dockerfiles/Dockerfile.rocm
      build-args: |
        USERNAME=triton
        BUILD_ROCM_VERSION=7.2.1
      platforms: linux/amd64
    secrets:
      qt_username: ${{ secrets.qt_username }}
      qt_password: ${{ secrets.qt_password }}

  rocm-image-sbom:
    needs: rocm-image_build
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/image-sbom.yml
    with:
      image-name: rocm
      image-tag: 7.2.1-centos10
    secrets:
      qt_username: ${{ secrets.qt_username }}
      qt_password: ${{ secrets.qt_password }}
